# python pinned to match ROOT's own build (6.38 -> 3.12); without
# this, conda-build tries conda-forge's global default python matrix
# and any slot ROOT wasn't built for is unsatisfiable under strict
# channel priority.
python:
  - "3.12"

c_stdlib:
  - sysroot                    # [linux]
  - macosx_deployment_target   # [osx]

c_stdlib_version:              # [unix]
  - 2.17                       # [linux]
  - 11.0                       # [osx]

# 6.36 dropped: 6.36.04 was only ever published for linux-64 (no
# linux-aarch64 build), so this variant slot was unconditionally
# unsatisfiable on arm64.
root:
  - 6.38

